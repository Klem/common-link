systemProp.http.proxyHost=
systemProp.http.proxyPort=
systemProp.https.proxyHost=
systemProp.https.proxyPort=
systemProp.http.nonProxyHosts=*

# Enable performance features
#org.gradle.jvmargs=-Xmx640m -XX:MaxMetaspaceSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.jvmargs=-Xmx480m -XX:MaxMetaspaceSize=192m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.compiler.execution.strategy=in-process -Dfile.encoding=UTF-8
#kotlin.daemon.jvmargs=-Xmx640m -XX:MaxMetaspaceSize=256m
kotlin.daemon.jvmargs=-Xmx480m -XX:MaxMetaspaceSize=192m
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.workers.max=1

# Optional but often helps Kotlin
kotlin.incremental=true
