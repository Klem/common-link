spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///commonlink
    username: commonlink
    password: commonlink
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

logging:
  level:
    org.commonlink: DEBUG
