spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

app:
  jwt:
    secret: commonlink-dev-secret-key-must-be-at-least-32-chars-long
  frontend-url: http://localhost:3000

logging:
  level:
    org.commonlink: DEBUG
