server:
  port: ${PORT:8080}

spring:
  application:
    name: commonlink-api
  datasource:
    url: ${COMMON_LINK_DB_URL:jdbc:postgresql://localhost:5432/commonlink}
    username: ${COMMON_LINK_DB_USER:commonlink}
    password: ${COMMON_LINK_DB_PASSWORD:commonlink}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: [update, validate]
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration


management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ${COMMON_LINK_SECRET:commonlink-dev-secret-key-must-be-at-least-32-chars-long}
  frontend-url: ${COMMON_LINK_FRONTEND_URL:http://localhost:3000}
  google:
    client-id: ${YOUR_GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:noreply@commonlink.org}
  insee:
    api-key: ${INSEE_API_KEY:default-key}
    base-url: ${INSEE_BASE_URL:https://api.insee.fr/api-sirene/3.11}
  vop:
    demo-mode: true
    api-url: ${VOP_BASE_URL=https://thirdparty.qonto.com/v2/sepa/verify_payee}
    api-token: ${VOP_API_TOKEN:}
  monerium:
    client-id: ${MONERIUM_CLIENT_ID:}
    base-url: ${MONERIUM_BASE_URL:https://api.monerium.dev}
    redirect-uri: ${MONERIUM_REDIRECT_URI:http://localhost:8080/api/monerium/callback}
    skip-kyc: true
    token-enc-key: ${MONERIUM_TOKEN_ENC_KEY:}
  # Curator bootstrap — set both env vars to create a CURATOR user on first deploy, then remove them.
  # The bean is absent when APP_CURATOR_EMAIL is unset; no runtime cost in normal operation.
  curator:
    email: ${APP_CURATOR_EMAIL:}
    password: ${APP_CURATOR_PASSWORD:}

springdoc:
  api-docs:
    enabled: true
    path: /api/docs/api.json
  swagger-ui:
    enabled: true
    path: /api/docs/swagger-ui.html

onchain:
  rpc-url: ${ONCHAIN_RPC_URL:http://172.30.10.204:8545}
  chain-id: ${ONCHAIN_CHAIN_ID:31337}
  registry-address: ${ONCHAIN_REGISTRY_ADDRESS}
  recorder-pk: ${ONCHAIN_RECORDER_PK}
  curator-pk: ${ONCHAIN_CURATOR_PK}
  polling-interval-ms: ${ONCHAIN_POLLING_INTERVAL_MS:1500}
  receipt-timeout-ms: ${ONCHAIN_RECEIPT_TIMEOUT_MS:60000}
  donor-address-secret: ${DONOR_ADDRESS_SECRET}
  worker:
    enabled: true
    batch-size: 10
    fixed-delay-ms: 5000

logging:
  level:
    org.commonlink: DEBUG
    org.springframework.security: INFO
