spring:
  application:
    name: commonlink-api
  security:
    user:
      name: admin
      password: admin


  datasource:
    url: jdbc:postgresql://localhost:5432/commonlink
    username: commonlink
    password: commonlink
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: commonlink-dev-secret-key-must-be-at-least-32-chars-long

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    org.commonlink: DEBUG
    org.springframework.security: INFO
