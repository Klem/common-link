server:
  port: 8080

spring:
  application:
    name: commonlink-api
  datasource:
    url: jdbc:postgresql://localhost:5432/commonlink
    username: commonlink
    password: commonlink
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ${COMMON_LINK_SECRET:commonlink-dev-secret-key-must-be-at-least-32-chars-long}
  frontend-url: http://localhost:3000
  google:
    client-id: ${YOUR_GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:noreply@commonlink.org}

springdoc:
  api-docs:
    enabled: true
    path: /api/docs/api.json
  swagger-ui:
    enabled: true
    path: /api/docs/swagger-ui.html

logging:
  level:
    org.commonlink: DEBUG
    org.springframework.security: INFO
