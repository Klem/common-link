[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

# Solidity
solc_version = "0.8.30"
evm_version = "paris"          # Polygon n'a pas encore PUSH0 partout, Paris reste safe
optimizer = true
optimizer_runs = 200            # Équilibre taille / coût runtime — adapté à des dons fréquents

# Tests
verbosity = 2
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32, fail_on_revert = false }

# Format / lint
extra_output = ["storageLayout"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[profile.ci]
# Profil CI : plus de runs de fuzz pour attraper les corner cases
fuzz = { runs = 10000 }
invariant = { runs = 1024, depth = 64, fail_on_revert = false }
verbosity = 3

[invariant]
runs                = 256
depth               = 64
fail_on_revert      = false   # handler swallows reverts; ghosts only update on success
call_override       = false
shrink_run_limit    = 5000

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"



# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
